<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="author" content="Matheus Luz Rodrigues">
    <meta name="description" content="Study Tracker - Manage your study tasks easily.">

    <!-- Personalized Font -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles/large-tasktracker.css">
    <link rel="stylesheet" href="styles/mobile-tasktracker.css">

    <!-- Scripts -->
    <script src="scripts/siteplan.js" defer></script>

    <title>Study Tracker</title>
</head>

<body>
    <header>
        <h1>Study Tracker</h1>
    </header>

    <main>
        <!-- Input to add tasks -->
        <section class="task-input">
            <input type="text" id="taskInput" placeholder="Enter a task...">
            <button id="addTaskBtn">Add</button>
        </section>

        <!-- Tasks Lists -->
        <section class="task-list">
            <ul id="taskList"></ul>
        </section>
    </main>

    <footer>
        <p>&copy;
            <span id="currentyear"></span>
            ⚙️ Matheus Rodrigues ⚙️ Brazil
        </p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
